# Config for training on a partial local OSV-5M dataset (shards 00-09)
# with a warm start from pre-trained GeoCLIP weights.
#
# Launch with:
#   python scripts/train.py --config configs/local_partial.yaml

model:
  clip_backbone: "ViT-B/16"
  freeze_layers: 9
  rff_num_scales: 10
  rff_dim: 256
  mlp_hidden: 1024
  embedding_dim: 512

data:
  mode: "local"
  zip_dir: "/data/cs_courses/geoclip/images/train"
  train_csv: "/data/cs_courses/geoclip/train.csv"
  val_csv: "/data/cs_courses/geoclip/test.csv"
  val_zip_dir: "/data/cs_courses/geoclip/images/test"
  num_workers: 4
  pin_memory: true

gallery:
  size: 10000
  strategy: "train_sample"
  cache_path: "gallery_local.pt"

training:
  pretrained_weights_dir: "geoclip/pre_trained_weights"
  batch_size: 128
  epochs: 30
  warmup_epochs: 2
  lr_clip: 5.0e-6                # lower than default — ViT is pre-trained
  lr_gps: 1.0e-4
  lr_temp: 1.0e-3
  weight_decay: 0.1
  amp: true
  log_every: 50
  eval_every: 1
  checkpoint_dir: "checkpoints_local/"
  hard_neg_swap_prob: 0.5
  hard_neg_min_dist_km: 500.0
  lambda_attn: 0.01
  attn_reg_every: 4

evaluation:
  thresholds_km: [1, 25, 200, 750, 2500]
